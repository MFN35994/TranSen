name: Android App Distribution

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0' # Adjust if needed, or leave empty for stable
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --split-per-abi

      - name: Upload to Firebase App Distribution
        uses: w9jds/firebase-action@master
        with:
          args: appdistribution:distribute build/app/outputs/flutter-apk/app-arm64-v8a-release.apk --app ${{ secrets.FIREBASE_APP_ID_ANDROID || '1:552529206563:android:9ce8bac8520d403803c096' }} --groups "testeurs_transen" --release-notes "Build automatique via GitHub Actions"
        env:
          GCP_SA_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}
          # Or use FIREBASE_TOKEN if preferred
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      - name: Upload arm-v7a to Firebase App Distribution
        uses: w9jds/firebase-action@master
        with:
          args: appdistribution:distribute build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk --app ${{ secrets.FIREBASE_APP_ID_ANDROID || '1:552529206563:android:9ce8bac8520d403803c096' }} --groups "testeurs_transen" --release-notes "Build automatique via GitHub Actions (arm-v7a)"
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
