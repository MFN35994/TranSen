name: transen
description: "A new Flutter project for transport and delivery."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  google_maps_flutter: ^2.5.3
  geolocator: ^10.1.0
  firebase_auth: ^6.3.0
  firebase_core: ^4.6.0
  flutter_riverpod: ^2.4.9
  google_fonts: ^8.0.2
  cloud_firestore: ^6.2.0
  google_sign_in: ^6.2.1
  url_launcher: ^6.1.11
  intl: ^0.18.1
  lottie: ^2.6.0
  firebase_messaging: ^16.1.3
  share_plus: ^10.1.0
  path_provider: ^2.1.2
  rxdart: ^0.28.0
  flutter_polyline_points: ^3.1.0
  flutter_local_notifications: ^17.2.2


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21
  remove_alpha_ios: true

flutter:
  uses-material-design: true

  assets:
    - assets/images/logo.png
    - assets/images/car_top.png
    - assets/legal/cgu.md
    - assets/legal/politique_confidentialite.md

